# Test profile — disables the cross-check task and the WireMock RestClient
# beans aren't exercised. Datasource is provisioned by Testcontainers via
# @ServiceConnection, so no explicit URL is configured here.

app.cross-check.enabled=false
app.wiremock.base-url=http://localhost:9999
app.wiremock.main-path=/__admin/mappings
app.wiremock.connect-timeout=PT0.5S
app.wiremock.read-timeout=PT1S
app.wiremock.max-retries=0
app.wiremock.retry-backoff=PT0S
app.cors.allowed-origins=

logging.level.com.wire.mate=DEBUG
spring.flyway.locations=classpath:db/migration
