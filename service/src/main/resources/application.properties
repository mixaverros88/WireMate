spring.application.name=wiremate-service
spring.profiles.default=dev
server.port=${SERVER_PORT:8081}

# Java 21+ virtual threads for the embedded servlet container — keeps p99
# latency stable when downstream WireMock is slow without ballooning the pool.
spring.threads.virtual.enabled=true

# ---------------------------------------------------------------------------
# Datasource / JPA
# ---------------------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:wiremate}
spring.datasource.username=${DB_USER:wiremate}
spring.datasource.password=${DB_PASSWORD:wiremate}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hikari sizing. Defaults of 10 are a sane starting point but make them
# explicit so they can be tuned per profile without surprises.
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN:2}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECT_TIMEOUT_MS:5000}
spring.datasource.hikari.validation-timeout=2000
spring.datasource.hikari.leak-detection-threshold=30000

# Schema is owned exclusively by Flyway. Hibernate must never touch DDL,
# and "validate" is too strict on Postgres TEXT vs VARCHAR equivalence so we
# use "none" and rely on integration tests to catch entity↔schema drift.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.type.json_format_mapper=org.hibernate.type.format.jackson.JacksonJsonFormatMapper
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ---------------------------------------------------------------------------
# Application config (bound via WireMateProperties)
# ---------------------------------------------------------------------------
app.wiremock.base-url=${APP_WIREMOCK_BASE_URL:http://localhost:8080}
app.wiremock.main-path=${APP_WIREMOCK_MAIN_PATH:/__admin/mappings}
app.wiremock.connect-timeout=${APP_WIREMOCK_CONNECT_TIMEOUT:PT2S}
app.wiremock.read-timeout=${APP_WIREMOCK_READ_TIMEOUT:PT5S}
app.wiremock.max-retries=${APP_WIREMOCK_MAX_RETRIES:2}
app.wiremock.retry-backoff=${APP_WIREMOCK_RETRY_BACKOFF:PT0.2S}

app.cross-check.interval=${APP_CROSS_CHECK_INTERVAL:PT10S}
app.cross-check.enabled=${APP_CROSS_CHECK_ENABLED:true}

# ---------------------------------------------------------------------------
# CORS
# ---------------------------------------------------------------------------
app.cors.allowed-origins=${APP_CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

# ---------------------------------------------------------------------------
# Actuator — only expose what is needed by ops; never /env, /heapdump, etc.
# ---------------------------------------------------------------------------
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when_authorized
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.metrics.tags.application=${spring.application.name}

# ---------------------------------------------------------------------------
# OpenAPI
# ---------------------------------------------------------------------------
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ---------------------------------------------------------------------------
# Logging — sensible defaults for prod. The dev profile re-enables show-sql.
# ---------------------------------------------------------------------------
logging.pattern.level=%5p [%X{correlationId:-},%X{traceId:-},%X{spanId:-}]
logging.level.com.wire.mate=INFO
spring.jpa.show-sql=false
