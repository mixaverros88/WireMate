server {
    root /usr/share/nginx/html;

    # Runtime config — never cache. The file is meant to be replaced
    # at deploy time (mounted from docker-compose) so caching it would
    # silently keep the old endpoints around after a config swap.
    location = /config.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires off;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
